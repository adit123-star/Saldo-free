<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Realtime Monitor Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #06040d;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 border-b border-slate-800 pb-5">
            <div>
                <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 uppercase"><i class="fas fa-crown mr-2"></i>admin</h1>
                <p class="text-xs text-slate-400">Memantau jumlah pendaftaran dan transaksi penarikan user.</p>
            </div>
            <button onclick="clearAllData()" class="self-start md:self-center bg-rose-500/10 border border-rose-500/20 text-rose-400 font-bold px-4 py-2 rounded-xl text-xs cursor-pointer hover:bg-rose-500/20 transition-all">
                <i class="fas fa-trash-alt mr-1"></i> Reset Seluruh Data Log
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="glass-card p-5 rounded-2xl flex items-center justify-between border-l-4 border-l-purple-500">
                <div>
                    <p class="text-xs text-slate-400 font-medium">Total Pendaftaran Akun</p>
                    <h3 class="text-3xl font-black text-white mt-1" id="stat-register">0</h3>
                </div>
                <div class="w-12 h-12 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400 text-xl">
                    <i class="fas fa-users"></i>
                </div>
            </div>
            
            <div class="glass-card p-5 rounded-2xl flex items-center justify-between border-l-4 border-l-emerald-500">
                <div>
                    <p class="text-xs text-slate-400 font-medium">Total Penarikan Selesai</p>
                    <h3 class="text-3xl font-black text-white mt-1" id="stat-withdraw">0</h3>
                </div>
                <div class="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 text-xl">
                    <i class="fas fa-money-check-alt"></i>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-5 space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-bold tracking-wider text-slate-300 uppercase"><i class="fas fa-list-alt text-amber-500 mr-2"></i>Log Masuk Penarikan Dana User</h2>
                <span class="text-[10px] bg-slate-900 border border-slate-800 px-2 py-1 rounded-md text-slate-500">Realtime Storage</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs text-slate-300">
                    <thead class="bg-slate-950/80 text-slate-400 border-b border-slate-900">
                        <tr>
                            <th class="p-3">User</th>
                            <th class="p-3">E-Wallet</th>
                            <th class="p-3">No. Akun</th>
                            <th class="p-3">Jumlah Potong</th>
                            <th class="p-3">Cair Bersih (-1k)</th>
                            <th class="p-3">Jam</th>
                        </tr>
                    </thead>
                    <tbody id="owner-table-body">
                        </tbody>
                </table>
                <div id="no-data-alert" class="hidden text-center py-8 text-slate-600">
                    <i class="fas fa-folder-open text-3xl mb-2 block"></i> Belum ada aktivitas transaksi dari user.
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadOwnerStats() {
            // Mengambil counter pendaftaran global dari index.html
            let regCount = localStorage.getItem('owner_total_register') || 0;
            document.getElementById('stat-register').innerText = `${regCount} Akun`;

            // Mengambil database array transaksi withdraw
            let wdList = JSON.parse(localStorage.getItem('owner_wd_list')) || [];
            document.getElementById('stat-withdraw').innerText = `${wdList.length} Kali`;

            const tbody = document.getElementById('owner-table-body');
            const noData = document.getElementById('no-data-alert');
            tbody.innerHTML = "";

            if (wdList.length === 0) {
                noData.classList.remove('hidden');
            } else {
                noData.classList.add('hidden');
                wdList.forEach(item => {
                    let tr = document.createElement('tr');
                    tr.className = "border-b border-slate-900/50 hover:bg-slate-900/20";
                    tr.innerHTML = `
                        <td class="p-3 font-bold text-purple-400">${item.user || 'Unknown'}</td>
                        <td class="p-3"><span class="bg-slate-900 border border-slate-800 px-2 py-0.5 rounded font-bold">${item.wallet}</span></td>
                        <td class="p-3 font-mono">${item.account}</td>
                        <td class="p-3 font-bold text-rose-400">Rp ${item.gross.toLocaleString('id-ID')}</td>
                        <td class="p-3 font-bold text-emerald-400">Rp ${item.net.toLocaleString('id-ID')}</td>
                        <td class="p-3 text-slate-500">${item.time} WIB</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function clearAllData() {
            if (confirm("Apakah Anda yakin ingin mereset seluruh metrik pendaftaran dan log withdraw di panel owner?")) {
                localStorage.setItem('owner_total_register', 0);
                localStorage.setItem('owner_wd_list', JSON.stringify([]));
                loadOwnerStats();
                alert("Data berhasil dibersihkan! 🧹");
            }
        }

        // Jalankan load data secara otomatis dan lakukan polling ringan setiap 2 detik
        window.onload = loadOwnerStats;
        setInterval(loadOwnerStats, 2000);
    </script>
</body>
</html>
